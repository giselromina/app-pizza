<div class="settings-page">
  <h1><mat-icon>settings</mat-icon> Configuración</h1>

  <div *ngIf="saved" class="saved-banner" role="status">
    <mat-icon>check_circle</mat-icon> Cambios guardados.
  </div>

  <mat-card appearance="outlined">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="save()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre del restaurante</mat-label>
          <input matInput formControlName="restaurant_name" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Número de WhatsApp (con código de país, sin +)</mat-label>
          <input matInput formControlName="whatsapp_number" placeholder="5491112345678" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Dirección</mat-label>
          <input matInput formControlName="restaurant_address" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Horarios</mat-label>
          <input matInput formControlName="restaurant_hours" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Mensaje de bienvenida</mat-label>
          <textarea matInput formControlName="welcome_message" rows="3"></textarea>
        </mat-form-field>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit">
            <mat-icon>save</mat-icon> Guardar cambios
          </button>
          <a mat-button routerLink="/admin">Volver al panel</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
