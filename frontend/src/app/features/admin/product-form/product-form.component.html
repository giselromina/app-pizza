<div class="form-page">
  <h1>{{ isEdit ? 'Editar Producto' : 'Nuevo Producto' }}</h1>

  <mat-card appearance="outlined">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="save()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="name" />
          <mat-error>El nombre es obligatorio (mín. 2 caracteres).</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Descripción</mat-label>
          <textarea matInput formControlName="description" rows="3"></textarea>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Precio</mat-label>
          <input matInput formControlName="price" type="number" min="0" step="10" />
          <span matTextPrefix>$&nbsp;</span>
          <mat-error>El precio es obligatorio.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Categoría</mat-label>
          <mat-select formControlName="category">
            <mat-option *ngFor="let cat of categories" [value]="cat[0]">{{ cat[1] }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>URL de imagen (opcional)</mat-label>
          <input matInput formControlName="image" type="url" placeholder="https://..." />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Orden</mat-label>
          <input matInput formControlName="sort_order" type="number" min="0" />
        </mat-form-field>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
            <mat-icon>save</mat-icon> {{ isEdit ? 'Guardar cambios' : 'Crear producto' }}
          </button>
          <a mat-button routerLink="/admin">Cancelar</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
