<div class="login-page">
  <mat-card class="login-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title><mat-icon>lock</mat-icon> Admin</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" [type]="showPassword ? 'text' : 'password'" autocomplete="current-password" />
          <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword" [attr.aria-label]="'Mostrar contraseña'">
            <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <div *ngIf="error" class="error-msg">{{ error }}</div>

        <button mat-raised-button color="primary" type="submit" class="full-width"
          [disabled]="form.invalid">
          Iniciar sesión
        </button>
      </form>

      <div *ngIf="isLoggedIn" class="logout-row">
        <button mat-stroked-button color="warn" type="button" class="full-width" (click)="authService.logout()">
          <mat-icon>logout</mat-icon> Cerrar sesión
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
